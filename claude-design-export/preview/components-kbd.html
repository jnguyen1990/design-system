<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 20px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .label { font-size: 13px; color: var(--text); flex: 1; }
  .keys { display: flex; gap: 4px; }
</style>
</head>
<body>
  <div class="row"><div class="label">Open command palette</div><div class="keys"><span class="kbd">⌘</span><span class="kbd">K</span></div></div>
  <div class="row"><div class="label">New entry</div><div class="keys"><span class="kbd">⌘</span><span class="kbd">N</span></div></div>
  <div class="row"><div class="label">Toggle sidebar</div><div class="keys"><span class="kbd">⌘</span><span class="kbd">/</span></div></div>
  <div class="row"><div class="label">Search</div><div class="keys"><span class="kbd">⌘</span><span class="kbd">F</span></div></div>
</body>
</html>
