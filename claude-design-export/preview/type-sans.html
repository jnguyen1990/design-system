<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row   { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .meta  { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .swatch { width: 56px; height: 56px; border-radius: 4px; border: 1px solid var(--border); flex-shrink: 0; }
  .swatch-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
  .swatch-step { aspect-ratio: 1; border-radius: 2px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div>
        <div style="font-size:13px; font-weight:500; color:var(--text);">Inter</div>
        <div class="meta">--font-sans · weights 400/500/600</div>
      </div>
    </div>
    <div style="font-family: var(--font-sans); font-weight:600; font-size:32px; letter-spacing:-0.01em; line-height:1.25;">Sharp. Precise.</div>
    <div style="font-family: var(--font-sans); font-weight:400; font-size:14px; line-height:1.5; color:var(--text-muted);">The quick brown fox jumps over the lazy dog. 0123456789</div>
  </div>
</body>
</html>
