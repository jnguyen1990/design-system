<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 24px; }
  .row { display: flex; gap: 24px; align-items: center; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img { width: 48px; height: 48px; }
  .name { font-size: 13px; font-weight: 500; color: var(--text); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><img src="../assets/hub-logo.svg" alt="Hub"><div class="name">Hub</div><div class="meta">slate</div></div>
    <div class="item"><img src="../assets/budgeter-logo.svg" alt="Budgeter"><div class="name">Budgeter</div><div class="meta">green</div></div>
    <div class="item"><img src="../assets/fitness-logo.svg" alt="Fitness"><div class="name">Fitness</div><div class="meta">orange</div></div>
    <div class="item"><img src="../assets/mealplanner-logo.svg" alt="Meal Planner"><div class="name">Meal Planner</div><div class="meta">purple</div></div>
  </div>
</body>
</html>
