<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 32px 24px; background: var(--bg-subtle); }
  .row { display: flex; gap: 32px; align-items: center; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .sq  { width: 100px; height: 64px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .desc { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="box"><div class="sq"></div><div class="name">resting</div><div class="desc">no shadow · cards, panels</div></div>
    <div class="box"><div class="sq" style="box-shadow: var(--shadow-floating)"></div><div class="name">floating</div><div class="desc">0 8px 24px rgba(0,0,0,0.12)</div></div>
    <div class="box"><div class="sq" style="background: var(--indigo-9); border-color: var(--indigo-10); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 1px 2px rgba(0,0,0,0.08);"></div><div class="name">solid btn</div><div class="desc">inset highlight + press</div></div>
  </div>
</body>
</html>
