<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 16px 20px; }
</style>
</head>
<body>
  <table class="tbl">
    <thead>
      <tr><th>Date</th><th>Description</th><th>Category</th><th class="num">Amount</th></tr>
    </thead>
    <tbody>
      <tr><td class="text-num text-muted">04-22</td><td>Whole Foods</td><td><span class="badge badge-green"><span class="badge-dot"></span>groceries</span></td><td class="num">−$84.20</td></tr>
      <tr><td class="text-num text-muted">04-21</td><td>Acme Corp · payroll</td><td><span class="badge badge-blue"><span class="badge-dot"></span>income</span></td><td class="num">+$3,400.00</td></tr>
      <tr><td class="text-num text-muted">04-20</td><td>Spotify</td><td><span class="badge badge-purple"><span class="badge-dot"></span>subscriptions</span></td><td class="num">−$10.99</td></tr>
    </tbody>
  </table>
</body>
</html>
