<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: 80px 1fr 110px; gap: 12px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .row:last-child { border-bottom: 0; }
  .swatch { height: 24px; border-radius: 3px; border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); color: var(--text); }
  .src  { font-family: var(--font-mono); color: var(--text-faint); text-align: right; font-size: 11px; }
</style>
</head>
<body>
  <div class="row"><div class="name">--bg</div><div class="swatch" style="background: var(--bg)"></div><div class="src">slate-1</div></div>
  <div class="row"><div class="name">--bg-subtle</div><div class="swatch" style="background: var(--bg-subtle)"></div><div class="src">slate-2</div></div>
  <div class="row"><div class="name">--panel</div><div class="swatch" style="background: var(--panel)"></div><div class="src">slate-3</div></div>
  <div class="row"><div class="name">--panel-hover</div><div class="swatch" style="background: var(--panel-hover)"></div><div class="src">slate-4</div></div>
  <div class="row"><div class="name">--border</div><div class="swatch" style="background: var(--border)"></div><div class="src">slate-6</div></div>
  <div class="row"><div class="name">--text-muted</div><div class="swatch" style="background: var(--text-muted)"></div><div class="src">slate-11</div></div>
  <div class="row"><div class="name">--text</div><div class="swatch" style="background: var(--text)"></div><div class="src">slate-12</div></div>
</body>
</html>
