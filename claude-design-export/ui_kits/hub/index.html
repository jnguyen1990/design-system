<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hub</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../_shared/Icon.jsx"></script>
<script type="text/babel" src="../_shared/Sidebar.jsx"></script>
<script type="text/babel" src="../_shared/PageHeader.jsx"></script>
<script type="text/babel" src="../_shared/CommandPalette.jsx"></script>
<script type="text/babel" src="HubComponents.jsx"></script>
<script type="text/babel">
function App() {
  const [selected, setSelected] = React.useState('today');
  const [paletteOpen, setPaletteOpen] = React.useState(false);
  const [inbox, setInbox] = React.useState([
    { color: 'green', title: 'Whole Foods · $84.20',  app: 'budgeter', detail: 'uncategorized', time: '12:04' },
    { color: 'orange', title: 'Pull · upper logged',   app: 'fitness',  detail: '6 lifts · 48m',   time: '08:12' },
    { color: 'blue',  title: 'Daily review',           app: 'hub',      detail: 'morning queue',   time: '07:30' },
    { color: 'pink',  title: 'Journal: weekend notes', app: 'hub',      detail: 'draft',           time: 'yest' },
  ]);

  React.useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setPaletteOpen(true); }
      if (e.key === 'Escape') setPaletteOpen(false);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const apps = [
    { id: 'budgeter', name: 'Budgeter', logo: '../../assets/budgeter-logo.svg', subtitle: '32 entries this month' },
    { id: 'fitness',  name: 'Fitness',  logo: '../../assets/fitness-logo.svg',  subtitle: 'last: 2d ago' },
    { id: 'hub',      name: 'Hub',      logo: '../../assets/hub-logo.svg',      subtitle: 'this app' },
  ];

  return (
    <div className="app-shell" data-screen-label="Hub · today">
      <Sidebar
        logo="../../assets/hub-logo.svg"
        title="hub"
        selectedId={selected}
        onSelect={setSelected}
        sections={[
          { items: [
            { id: 'inbox',    label: 'inbox',    color: 'blue',  kbd: '⌘1', count: inbox.length },
            { id: 'today',    label: 'today',    color: 'green', kbd: '⌘2' },
            { id: 'upcoming', label: 'upcoming', color: 'amber', kbd: '⌘3' },
            { id: 'someday',  label: 'someday',  color: 'purple', kbd: '⌘4' },
          ]},
          { label: 'apps', items: [
            { id: 'budgeter', label: 'budgeter', color: 'green' },
            { id: 'fitness',  label: 'fitness',  color: 'orange' },
          ]},
          { label: 'archive', items: [
            { id: 'journal',  label: 'journal',  color: 'pink' },
            { id: 'archive',  label: 'archive',  color: 'slate' },
          ]},
        ]}
        footer={
          <div style={{ padding: '8px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-faint)' }}>
            <span>⌘K to search</span>
            <span className="text-num">v0.4.2</span>
          </div>
        }
      />
      <main className="app-main">
        <PageHeader
          title="Today"
          subtitle="Tuesday · 25 apr"
          actions={
            <>
              <button className="btn btn-secondary btn-sm">Filter</button>
              <button className="btn btn-primary btn-sm" onClick={() => setPaletteOpen(true)}>+ new entry</button>
            </>
          }
        />

        <div style={{ marginBottom: 32 }}>
          <HubQuickEntry onSubmit={(v) => setInbox([{ color: 'blue', title: v, app: 'hub', detail: 'just added', time: 'now' }, ...inbox])} />
        </div>

        <h3 style={{ marginBottom: 12 }}>Apps</h3>
        <div style={{ marginBottom: 32 }}>
          <HubAppGrid apps={apps} />
        </div>

        <h3 style={{ marginBottom: 12 }}>Inbox <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 400, color: 'var(--text-faint)', marginLeft: 6 }}>{inbox.length}</span></h3>
        <div className="card" style={{ padding: '4px 16px' }}>
          <HubInbox items={inbox} />
        </div>
      </main>

      <CommandPalette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        commands={[
          { label: 'new entry',           color: 'blue',  kbd: '⌘N' },
          { label: 'open budgeter',       color: 'green' },
          { label: 'open fitness',        color: 'orange' },
          { label: 'log workout',         color: 'orange' },
          { label: 'add transaction',     color: 'green' },
          { label: 'archive selected',    color: 'slate' },
          { label: 'toggle theme',        color: 'slate', kbd: '⌘T' },
        ]}
      />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
